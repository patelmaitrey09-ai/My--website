<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Special Surprise</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ffdde1,#ee9ca7);
text-align:center;
padding:40px;
overflow:hidden;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:360px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
position:relative;
}

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:8px;
background:#ff5c8d;
color:white;
cursor:pointer;
font-size:16px;
}

input{
padding:10px;
width:80%;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

#result{
margin-top:20px;
font-size:17px;
min-height:60px;
}

#secret{
display:none;
margin-top:20px;
}

#secretBtn{
display:none;
}

#specialMsg{
display:none;
font-size:22px;
color:#ff2e63;
margin-top:15px;
animation:fade 2s infinite alternate;
}

@keyframes fade{
from{opacity:0.4;}
to{opacity:1;}
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

#celebrate{
display:none;
font-size:26px;
color:#ff2e63;
margin-top:20px;
}

</style>
</head>

<body>

<h2>🎁 A Small Surprise For You</h2>

<button onclick="startSurprise()">Open Surprise</button>

<div class="box" id="mainBox">

<h3>✨ Enter Your Name ✨</h3>

<input type="text" id="nameInput" placeholder="Type your name">

<br>

<button onclick="showMessage()">Show</button>
<button onclick="clearText()">Clear</button>

<div id="result"></div>

<div id="specialMsg">❤️ This surprise is specially for you ❤️</div>

<br>

<button id="secretBtn" onclick="showSecret()">💌 Final Secret</button>

<div id="secret">

<p>Do you like Maitrey?</p>

<button onclick="yes()">Yes 😊</button>

<button id="noBtn" onmouseover="moveButton()">Think About It 🤔</button>

</div>

<div id="celebrate"></div>

</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

function startSurprise(){
document.getElementById("mainBox").style.display="block";
document.getElementById("music").play();
}

/* floating hearts */

setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

},500);

/* typing effect */

function typeText(text){

let result=document.getElementById("result");
result.innerHTML="";

let i=0;

function typing(){
if(i<text.length){
result.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,30);
}
}

typing();

}

/* show message */

function showMessage(){

let name=document.getElementById("nameInput").value.trim();
let lower=name.toLowerCase();

if(name===""){
typeText("Please enter a name.");
document.getElementById("secretBtn").style.display="none";
document.getElementById("specialMsg").style.display="none";
return;
}

/* hide secret button by default */
document.getElementById("secretBtn").style.display="none";
document.getElementById("specialMsg").style.display="none";

if(lower==="varnika"){

typeText("Varnika ji, aap ek bahut hi sweet aur special person ho. Aapki personality aur kindness bahut achhi hai. ✨ Ye link aapko jisne bheji hai uska name likh kar dekhe.");

document.getElementById("specialMsg").style.display="block";

}

else if(lower==="maitrey"){

typeText("Maitrey aapke liye bahut loyal hai. Varnika ji please ek baar aap usse accept karke usse ek mauka dijiye. Vo aapki har baat manage karne ke liye taiyar hai.");

/* show final secret button only for Maitrey */
document.getElementById("secretBtn").style.display="inline-block";

}

else{

let messages=[
name + ", aap ek amazing person ho.",
name + ", aapke andar bahut talent hai.",
name + ", aapki personality bahut unique hai.",
name + ", aap positivity spread karte ho."
];

let random=messages[Math.floor(Math.random()*messages.length)];

typeText(random);

}

}

function clearText(){
document.getElementById("nameInput").value="";
document.getElementById("result").innerHTML="";
document.getElementById("specialMsg").style.display="none";
document.getElementById("secretBtn").style.display="none";
}

function showSecret(){
document.getElementById("secret").style.display="block";
}

function moveButton(){

let button=document.getElementById("noBtn");

let x=Math.random()*300;
let y=Math.random()*200;

button.style.position="absolute";
button.style.left=x+"px";
button.style.top=y+"px";

}

function yes(){

document.getElementById("celebrate").style.display="block";

document.getElementById("celebrate").innerHTML=
"💖 She said YES! 💖 <br><br> Jao jaake usse jaldi I love you vala message bhejo ❤️";

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
heart.style.fontSize="25px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},3000);

}

/* open whatsapp */

setTimeout(function(){

window.open("https://wa.me/?text=I%20love%20you%20❤️");

},2000);

}

</script>

</body>
</html>
